# PDL Pilot — Phase 1.5 live THEMIS/OMNI configuration
#
# This config drives 1–2 real encounters through the same pipeline
# as the synthetic pilot.  The encounter windows below are manually
# specified — Phase 1.5 does NOT auto-discover crossings.
#
# WARNING (Phase 1.5 hardening): The current pilot windows are
# SCIENTIFICALLY INELIGIBLE.  They are retained as diagnostic
# examples only.  Pipeline runs will produce FAIL_GEOMETRY or
# FAIL_OCCUPANCY status.  See preflight output for details.
#
# To get a scientifically evaluable live pilot, replace these
# windows with confirmed dayside magnetosheath encounters:
#   - X_GSM > 8 Re, |Y_GSM| < 5 Re, SZA < 30°
#   - spacecraft in sheath (not magnetosphere or upstream)
#   - known moderate steady Dp (1-4 nPa)

run_label: "pilot_live_v1_hardened"

data_source: "live"
random_seed: 42

# Boundary models (frozen for Phase 1)
boundary_models:
  magnetopause: "shue1998"
  bow_shock: "merka2005"
  distance_direction: "sun_earth_line"

# Normalized s-bins (blueprint §5.3)
bins:
  very_near: [0.0, 0.2]
  near: [0.2, 0.4]
  background: [0.6, 1.0]

# Filters
filters:
  trend_window_seconds: 120.0
  min_sheath_duration_seconds: 300.0

# Uncertainty envelope
uncertainty:
  mp_standoff_delta_re: 0.5
  bs_standoff_delta_re: 1.0

# Scientific preflight (Phase 1.5 hardening)
preflight:
  max_sza_deg: 60.0
  min_x_gsm_re: 5.0
  max_abs_y_gsm_re: 15.0
  min_valid_fraction: 0.5
  min_density_cm3: 0.5
  max_density_cm3: 200.0
  min_bmag_nT: 1.0
  max_bmag_nT: 200.0
  min_beta_sheath: 0.01
  max_beta_sheath: 100.0
  min_membership_fraction: 0.5
  min_near_occupancy: 0.02
  min_bg_occupancy: 0.02
  min_s_std: 0.01
  fill_masking_policy: "auto"
  grade_with_incomplete_flags: "cap_silver"

# Output
output_dir: "runs"

# Live data settings (PROVISIONAL)
live:
  backend: "cdasws"
  fgm_dataset: "TH{probe}_L2_FGM"
  mom_dataset: "TH{probe}_L2_MOM"
  state_dataset: "TH{probe}_L1_STATE"
  omni_dataset: "OMNI_HRO_1MIN"
  omni_pre_window_minutes: 30.0
  omni_post_window_minutes: 10.0
  resample_cadence_seconds: 3.0
  interpolation_method: "linear"
  max_gap_seconds: 30.0
  cache_dir: "data_cache"
  cache_policy: "use"

# Pilot encounters — SCIENTIFICALLY INELIGIBLE diagnostic windows
#
# KNOWN ISSUE (Phase 1.5):
#   - live_pilot_001: THD at Y=10.5 Re, SZA=72° → deep flank, FAIL_GEOMETRY
#   - live_pilot_002: THE at X=-2.2 Re, SZA=116° → nightside, FAIL_GEOMETRY
#
# These demonstrate that the live pipeline works end-to-end but are
# NOT valid dayside science pilots.  Replace with curated windows.

encounters:
  - encounter_id: "live_pilot_001"
    spacecraft: "themis"
    probe: "thd"
    time_start: "2012-11-03T15:00:00"
    time_end: "2012-11-03T15:20:00"
    crossing_count: 1
    notes: >
      DIAGNOSTIC ONLY — NOT dayside. THD at Y=10.5 Re (deep flank), SZA=72°.
      Will produce FAIL_GEOMETRY. Retained to validate live pipeline works.

  - encounter_id: "live_pilot_002"
    spacecraft: "themis"
    probe: "the"
    time_start: "2008-11-12T06:00:00"
    time_end: "2008-11-12T06:15:00"
    crossing_count: 1
    notes: >
      DIAGNOSTIC ONLY — NOT dayside. THE at X=-2.2 Re (nightside), SZA=116°.
      Will produce FAIL_GEOMETRY. Retained to validate live pipeline works.
