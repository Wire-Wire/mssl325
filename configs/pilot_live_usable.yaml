# PDL Pilot — Usable real-window bank (Phase 2a frozen state v2)
#
# STATUS: Measurement-model-valid windows with near/background leverage.
#
# NAMING DISCIPLINE:
#   All windows are: "measurement-model-valid near-MP comparator windows"
#   None is classified as PDL-positive, non-PDL, or a labeled example.
#
# CONSTRAINT LAYERS (Phase 2a upstream decision memo):
#   Layer A (strong): dual-bin leverage, dayside geometry, QC intact
#   Layer B (ranking only): SZA/geometry preferences, moderate Dp guidance
#   Layer C (deferred): PDL labels, thresholds, dev-set membership
#
# WINDOW BANK: 7 windows across 4 orbital passes, 2 seasons (2008, 2009)
#   2008-08-18 THD: Dp ~4 nPa, mixed Bz, layer-like pattern
#   2008-09-03 THD: Dp ~3.5 nPa, northward Bz, compressed-sheath pattern
#   2009-09-13 THD: Dp ~3 nPa, southward Bz, depletion pattern
#   2009-09-26 THD: Dp ~3 nPa, weak Bz, near-subsolar (SZA~4°)
#   2009-10-24 THD: Dp ~4 nPa, weak Bz, high enhancement

run_label: "usable_window_bank_v2"
data_source: "live"
random_seed: 42

boundary_models:
  magnetopause: "shue1998"
  bow_shock: "merka2005"
  distance_direction: "sun_earth_line"

bins:
  very_near: [0.0, 0.2]
  near: [0.2, 0.4]
  background: [0.6, 1.0]

filters:
  trend_window_seconds: 120.0
  min_sheath_duration_seconds: 300.0

uncertainty:
  mp_standoff_delta_re: 0.5
  bs_standoff_delta_re: 1.0

preflight:
  max_sza_deg: 60.0
  min_x_gsm_re: 5.0
  max_abs_y_gsm_re: 15.0
  min_valid_fraction: 0.3
  min_density_cm3: 0.3
  max_density_cm3: 200.0
  min_bmag_nT: 1.0
  max_bmag_nT: 200.0
  min_beta_sheath: 0.01
  max_beta_sheath: 100.0
  min_membership_fraction: 0.3
  min_near_occupancy: 0.01
  min_bg_occupancy: 0.01
  min_s_std: 0.005
  fill_masking_policy: "auto"
  grade_with_incomplete_flags: "cap_silver"

output_dir: "runs"

live:
  backend: "cdasws"
  fgm_dataset: "TH{probe}_L2_FGM"
  mom_dataset: "TH{probe}_L2_MOM"
  state_dataset: "TH{probe}_L1_STATE"
  omni_dataset: "OMNI_HRO_1MIN"
  omni_pre_window_minutes: 30.0
  omni_post_window_minutes: 10.0
  resample_cadence_seconds: 10.0
  interpolation_method: "linear"
  max_gap_seconds: 60.0
  cache_dir: "data_cache"
  cache_policy: "use"

# ============================================================
# WINDOW BANK — 7 measurement-model-valid comparator windows
# ============================================================

encounters:
  # --- 2008 Season ---

  - encounter_id: "usable_aug18_6h"
    spacecraft: "themis"
    probe: "thd"
    time_start: "2008-08-18T18:00:00"
    time_end: "2008-08-19T00:00:00"
    crossing_count: 1
    notes: >
      Comparator window. THD Aug 18 2008. 6h.
      Dp~4.2, Bz~+0.3. Near=16%, BG=48%.
      Dn=0.12, EB=2.49, rho=-0.46. Layer-like pattern.

  - encounter_id: "usable_sep03_6h"
    spacecraft: "themis"
    probe: "thd"
    time_start: "2008-09-03T19:00:00"
    time_end: "2008-09-04T01:00:00"
    crossing_count: 1
    notes: >
      Comparator window. THD Sep 3 2008. 6h.
      Dp~3.5, Bz~+0.9. Near=17%, BG=27%.
      Dn=2.31, EB=0.82, rho=-0.52. Compressed-sheath pattern.

  - encounter_id: "usable_sep03_8h"
    spacecraft: "themis"
    probe: "thd"
    time_start: "2008-09-03T17:00:00"
    time_end: "2008-09-04T01:00:00"
    crossing_count: 1
    notes: >
      Comparator window. Sep 3 wider. Dp~3.5, Bz~+2.6.
      Near=13%, BG=40%.

  # --- 2009 Season ---

  - encounter_id: "usable_sep13_09_6h"
    spacecraft: "themis"
    probe: "thd"
    time_start: "2009-09-13T17:00:00"
    time_end: "2009-09-13T23:00:00"
    crossing_count: 1
    notes: >
      Comparator window. THD Sep 13 2009. 6h.
      Dp~3.1, Bz~-1.4 (southward). Near=17%, BG=47%.
      Dn=0.39, EB=1.96, rho=-0.90. Strong anti-correlation.

  - encounter_id: "usable_sep26_09_10h"
    spacecraft: "themis"
    probe: "thd"
    time_start: "2009-09-26T14:00:00"
    time_end: "2009-09-27T00:00:00"
    crossing_count: 1
    notes: >
      Comparator window. THD Sep 26 2009. 10h. Near-subsolar SZA~4 deg.
      Dp~3.0, Bz~+0.9. Near=18%, BG=40%.
      Dn=0.94, EB=1.96, rho=-0.91. Strong anti-correlation.

  - encounter_id: "usable_oct24_09_6h"
    spacecraft: "themis"
    probe: "thd"
    time_start: "2009-10-24T14:30:00"
    time_end: "2009-10-24T20:30:00"
    crossing_count: 1
    notes: >
      Comparator window. THD Oct 24 2009. 6h.
      Dp~4.2, Bz~-0.5. Near=14%, BG=65%.
      Dn=2.19, EB=4.22, rho=-0.66. High enhancement.

  - encounter_id: "usable_aug18_8h"
    spacecraft: "themis"
    probe: "thd"
    time_start: "2008-08-18T17:00:00"
    time_end: "2008-08-19T01:00:00"
    crossing_count: 1
    notes: >
      Comparator window. Aug 18 wider. Dp~3.6, Bz~+0.1.
      Near=17%, BG=12%.
